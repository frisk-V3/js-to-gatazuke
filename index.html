<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JS Type-Embedder Transpiler</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Fira Code', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .toolbar { background: #222; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .container { display: flex; flex: 1; }
        .box { flex: 1; display: flex; flex-direction: column; position: relative; }
        label { position: absolute; top: 5px; right: 20px; font-size: 10px; color: #666; text-transform: uppercase; }
        textarea { flex: 1; background: #121212; color: #9cdcfe; border: 1px solid #333; padding: 25px 15px 15px; font-size: 14px; resize: none; outline: none; line-height: 1.5; }
        #output { background: #1a1a1a; color: #ce9178; }
        .arrow { display: flex; align-items: center; padding: 0 10px; color: #555; font-size: 24px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <strong>TYPE-TRANSPILLER v1.0</strong>
        <span style="margin-left: 20px; font-size: 12px; color: #888;">Input JS -> Generates Runtime-Type-Checked JS</span>
    </div>
    <div class="container">
        <div class="box">
            <label>Source JavaScript</label>
            <textarea id="input" placeholder="let x = 100;&#10;const msg = 'hello';"></textarea>
        </div>
        <div class="arrow">➡</div>
        <div class="box">
            <label>Compiled (Typed) JS</label>
            <textarea id="output" readonly></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
