<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Core Typed Engine</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 20px; }
        .controls { background: #222; padding: 20px; border: 1px solid #0f0; margin-bottom: 10px; }
        #console { height: 300px; overflow-y: auto; background: #000; padding: 10px; border: 1px dashed #0f0; }
        .error { color: #f00; font-weight: bold; border-left: 3px solid #f00; padding-left: 5px; }
    </style>
</head>
<body>
    <h2>JS Strict Type Enforcer</h2>
    
    <div class="controls">
        <label>
            <input type="checkbox" id="strictMode"> **STRICT TYPE MODE (型強制)**
        </label>
        <br><br>
        <button onclick="runTest()">テスト実行 (10 + "20" を代入してみる)</button>
    </div>

    <div id="console"></div>

    <script src="script.js"></script>
</body>
</html>
